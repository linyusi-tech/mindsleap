name: Deploy mindsleap.cn

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-mindsleap-cn
  cancel-in-progress: true

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - x64
      - mindsleap-cn
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync code into deployment directory
        run: |
          set -euo pipefail
          DEPLOY_ROOT=/www/wwwroot/mindsleap
          mkdir -p "$DEPLOY_ROOT"
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'site/node_modules' \
            --exclude 'site/.next' \
            ./ "$DEPLOY_ROOT/"

      - name: Build and restart locally
        env:
          SITE_URL: ${{ secrets.CN_SITE_URL }}
          CONTACT_PUBLIC_EMAIL: ${{ secrets.CN_CONTACT_PUBLIC_EMAIL }}
          RESEND_API_KEY: ${{ secrets.CN_RESEND_API_KEY }}
          CONTACT_EMAIL: ${{ secrets.CN_CONTACT_EMAIL }}
          CONTACT_FROM_EMAIL: ${{ secrets.CN_CONTACT_FROM_EMAIL }}
        run: |
          set -euo pipefail
          cd /www/wwwroot/mindsleap/site
          cat > .env.production <<ENVEOF
          SITE_URL=${SITE_URL}
          CONTACT_PUBLIC_EMAIL=${CONTACT_PUBLIC_EMAIL}
          RESEND_API_KEY=${RESEND_API_KEY}
          CONTACT_EMAIL=${CONTACT_EMAIL}
          CONTACT_FROM_EMAIL=${CONTACT_FROM_EMAIL}
          ENVEOF
          npm ci --no-fund --no-audit
          rm -rf .next
          NODE_OPTIONS=--max-old-space-size=1536 npm run build
          if pm2 describe mindsleap >/dev/null 2>&1; then
            pm2 restart mindsleap --update-env
          else
            pm2 start npm --name mindsleap --cwd /www/wwwroot/mindsleap/site -- start -- -p 3000
          fi
          pm2 save
